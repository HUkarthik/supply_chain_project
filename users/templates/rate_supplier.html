<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rate Supplier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .modal-content {
            background: rgba(15, 32, 39, 0.95);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .rating-stars {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 15px 0;
        }
        .rating-stars label {
            cursor: pointer;
            color: #ddd;
            font-size: 2rem;
            transition: color 0.2s;
        }
        .rating-stars input[type="radio"]:checked ~ label,
        .rating-stars input[type="radio"]:hover ~ label,
        .rating-stars label:hover {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="modal" id="ratingModal" tabindex="-1" aria-labelledby="ratingModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ratingModalLabel">Rate Supplier</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" action="{% url 'users:rate_supplier' order.id %}">
                        {% csrf_token %}
                        <input type="hidden" name="order_id" value="{{ order.id }}">
                        <div class="rating-stars">
                            {% for i in "12345" %}
                                <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" required>
                                <label for="star{{ i }}" class="star">★</label>
                            {% endfor %}
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Submit Rating</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const modal = new bootstrap.Modal(document.getElementById('ratingModal'));
            modal.show();
        });
    </script>
</body>
</html>
