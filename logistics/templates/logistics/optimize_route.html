<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Optimized Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 20px auto;
            max-width: 800px;
        }
        h1 {
            color: #1a252f;
            text-align: center;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        p {
            color: #2c3e50;
        }
        #map {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border-radius: 5px;
        }
        .error-message {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Optimized Route</h1>
        <p>Order ID: {{ order.id }}</p>
        <p>Start Location: {{ logistics.start_location }}</p>
        <p>Destination: {{ logistics.destination }}</p>
        <p>AI-Optimized Route: {{ logistics.optimized_route }}</p>
        <p>Estimated Time: {{ logistics.estimated_time }}</p>
        <p>Distance: {{ logistics.distance }}</p>
        <div id="map"></div>
        <div id="map-error" class="error-message"></div>
        <a href="{% url 'users:supplier_dashboard' %}" class="btn btn-primary mt-3">Back to Dashboard</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAaY9EE4VQTi9eykGzX3R3a6bSHtiNpa2I&callback=initMap" async defer></script>
    <script>
        function initMap() {
            const start = '{{ logistics.start_location|escapejs }}';
            const end = '{{ logistics.destination|escapejs }}';
            const mapError = document.getElementById('map-error');

            // Validate locations
            if (!start || !end) {
                mapError.textContent = 'Error: Start location or destination is missing.';
                return;
            }

            // Initialize map centered on India
            const map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 20.5937, lng: 78.9629 }, // Centered on India
                zoom: 6,
            });

            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer();
            directionsRenderer.setMap(map);

            const request = {
                origin: start,
                destination: end,
                travelMode: 'DRIVING',
            };

            directionsService.route(request, function(result, status) {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                    mapError.textContent = ''; // Clear any previous error
                } else {
                    mapError.textContent = 'Directions request failed: ' + status;
                }
            });
        }

        // Handle API load errors
        window.addEventListener('error', function(e) {
            if (e.message.includes('Google Maps JavaScript API')) {
                document.getElementById('map-error').textContent = 'Failed to load Google Maps API. Please check your API key.';
            }
        });
    </script>
</body>
</html>
